<!DOCTYPE html>
<html>
<head>
<title>Game Shop UI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="logo">JUBALY</div>
    <div class="profile">👤</div>
</header>

<div class="container">

    <div class="sidebar">
        <ul>
            <li class="active">Home</li>
            <li>Shop</li>
            <li>Top Up</li>
            <li>Gift Card</li>
            <li>Subscriptions</li>
            <li>Blog</li>
            <li>FAQs</li>
            <li>Become an Affiliate</li>
        </ul>
    </div>

    <div class="content">

        <h2>New Arrival 🔥</h2>

        <div class="arrival">

            <div class="card small">
                <img src="chatgpt.png">
                <p>ChatGPT Digital</p>
            </div>

            <div class="card small">
                <img src="game1.png">
                <p>Eggy Party</p>
            </div>

            <div class="card small">
                <img src="game2.png">
                <p>Genshin Impact</p>
            </div>

        </div>

        <h2>HOT ITEM</h2>

        <div class="hot">

            <div class="card">
                <img src="item1.png">
                <p>Brilliant Connect</p>
            </div>

            <div class="card">
                <img src="item2.png">
                <p>100% Bonus Top Up</p>
            </div>

            <div class="card">
                <img src="item3.png">
                <p>Free Fire Level Pass</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
